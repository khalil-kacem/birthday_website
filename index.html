<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Maryem</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0005;
    min-height: 100vh;
    overflow-x: hidden;
    font-family: 'Georgia', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Starfield ── */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0.1; }
    to   { opacity: 0.8; }
  }

  /* ── Falling petals ── */
  .petals-layer {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    top: -60px;
    width: var(--s, 14px);
    height: var(--s, 14px);
    background: var(--c, #c0132a);
    border-radius: 0 70% 0 70%;
    transform-origin: center center;
    animation: fall var(--fd, 8s) linear var(--fd2, 0s) infinite,
               sway var(--sw, 3s) ease-in-out infinite alternate;
    opacity: 0.85;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes sway {
    from { margin-left: 0; }
    to   { margin-left: var(--ml, 40px); }
  }

  /* ── Floating flowers (background) ── */
  .bg-flowers {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .bg-flower {
    position: absolute;
    animation: floatUp var(--fu, 14s) ease-in-out var(--fu2, 0s) infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { opacity: 0;    transform: translateY(0)     scale(0.4) rotate(0deg); }
    15%  { opacity: 0.35; }
    85%  { opacity: 0.2; }
    100% { opacity: 0;    transform: translateY(-90vh) scale(0.9) rotate(360deg); }
  }

  /* ── SVG flower helper ── */
  .flower-svg { display: block; }

  /* ── Glowing vine borders ── */
  .vines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }
  .vine-svg { width: 100%; height: 100%; }

  /* ── Main card ── */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 60px 70px;
    background: linear-gradient(135deg,
      rgba(80,0,20,0.55) 0%,
      rgba(20,0,8,0.75) 50%,
      rgba(80,0,20,0.55) 100%);
    border: 1px solid rgba(200,20,50,0.35);
    border-radius: 24px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 0 60px rgba(180,0,40,0.25),
      0 0 120px rgba(120,0,30,0.15),
      inset 0 0 40px rgba(180,20,50,0.08);
    max-width: 680px;
    width: 92vw;
    animation: cardBreath 5s ease-in-out infinite alternate;
  }
  @keyframes cardBreath {
    from { box-shadow: 0 0 60px rgba(180,0,40,0.25), 0 0 120px rgba(120,0,30,0.15), inset 0 0 40px rgba(180,20,50,0.08); }
    to   { box-shadow: 0 0 90px rgba(220,10,60,0.45), 0 0 180px rgba(160,0,50,0.25), inset 0 0 60px rgba(200,20,60,0.15); }
  }

  /* ── Corner flower decorations ── */
  .corner {
    position: absolute;
    width: 90px;
    height: 90px;
  }
  .corner.tl { top: -18px; left: -18px; }
  .corner.tr { top: -18px; right: -18px; transform: scaleX(-1); }
  .corner.bl { bottom: -18px; left: -18px; transform: scaleY(-1); }
  .corner.br { bottom: -18px; right: -18px; transform: scale(-1); }

  /* ── "Happy Birthday" header ── */
  .greeting {
    font-size: clamp(13px, 2.5vw, 18px);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: #e87090;
    margin-bottom: 10px;
    animation: fadeSlideDown 1.2s ease both;
    text-shadow: 0 0 20px rgba(220,80,110,0.6);
  }

  /* ── Name ── */
  .name {
    font-size: clamp(42px, 9vw, 82px);
    font-weight: 700;
    font-family: 'Georgia', serif;
    background: linear-gradient(135deg, #ff6b8a 0%, #ff1a45 35%, #c00030 60%, #ff6b8a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    background-size: 200% auto;
    animation: shimmer 3s linear infinite, fadeSlideUp 1.4s ease both;
    line-height: 1.1;
    filter: drop-shadow(0 0 18px rgba(255,60,90,0.55));
  }
  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Divider ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 22px auto;
    width: fit-content;
    animation: fadeIn 1.8s ease both;
  }
  .divider-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c0132a, transparent);
  }
  .divider-dot {
    width: 8px; height: 8px;
    background: #e02040;
    border-radius: 50%;
    box-shadow: 0 0 8px #ff2050;
    animation: pulse 1.5s ease-in-out infinite alternate;
  }
  @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.5); } }
  @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }

  /* ── Message ── */
  .message {
    font-size: clamp(13px, 2.1vw, 16px);
    color: #e8b0b8;
    line-height: 1.85;
    letter-spacing: 0.02em;
    max-width: 460px;
    margin: 0 auto 28px;
    animation: fadeIn 2.2s ease both;
    text-shadow: 0 1px 8px rgba(0,0,0,0.6);
  }

  /* ── Roses row inside card ── */
  .roses-row {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 8px;
    animation: fadeIn 2.5s ease both;
  }
  .rose-icon {
    animation: roseWobble 2.5s ease-in-out infinite alternate;
  }
  .rose-icon:nth-child(2) { animation-delay: 0.4s; }
  .rose-icon:nth-child(3) { animation-delay: 0.8s; }
  .rose-icon:nth-child(4) { animation-delay: 1.2s; }
  .rose-icon:nth-child(5) { animation-delay: 1.6s; }
  @keyframes roseWobble {
    from { transform: rotate(-8deg) scale(0.95); }
    to   { transform: rotate(8deg)  scale(1.1); }
  }

  /* ── Sparkle ring ── */
  .sparkle-ring {
    position: absolute;
    inset: -2px;
    border-radius: 26px;
    pointer-events: none;
    overflow: hidden;
  }
  .sparkle-ring::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 26px;
    background: conic-gradient(
      from var(--a, 0deg),
      transparent 0deg 60deg,
      rgba(255,80,100,0.5) 70deg 90deg,
      transparent 100deg 180deg,
      rgba(255,80,100,0.4) 190deg 210deg,
      transparent 220deg 360deg
    );
    animation: spin 6s linear infinite;
    mask: linear-gradient(#fff 0 0) content-box,
          linear-gradient(#fff 0 0);
    -webkit-mask: linear-gradient(#fff 0 0) content-box,
                  linear-gradient(#fff 0 0);
    mask-composite: exclude;
    -webkit-mask-composite: destination-out;
    padding: 1.5px;
  }
  @keyframes spin { from { --a: 0deg; } to { --a: 360deg; } }
  @property --a { syntax: '<angle>'; inherits: false; initial-value: 0deg; }

  /* ── Candle flames ── */
  .candles {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 18px;
    animation: fadeIn 1s ease both;
  }
  .candle-wrap { display: flex; flex-direction: column; align-items: center; }
  .flame {
    width: 10px; height: 18px;
    background: radial-gradient(ellipse at 50% 80%, #fff9c4 0%, #ffcc00 40%, #ff6600 75%, transparent 100%);
    border-radius: 50% 50% 20% 20%;
    animation: flicker var(--fl, 0.8s) ease-in-out infinite alternate;
    box-shadow: 0 0 10px 3px rgba(255,150,0,0.6), 0 0 20px 6px rgba(255,80,0,0.3);
  }
  @keyframes flicker {
    0%   { transform: scaleX(1)    scaleY(1)    rotate(-2deg); }
    33%  { transform: scaleX(0.85) scaleY(1.08) rotate(2deg); }
    66%  { transform: scaleX(1.1)  scaleY(0.95) rotate(-1deg); }
    100% { transform: scaleX(0.9)  scaleY(1.05) rotate(3deg); }
  }
  .candle-body {
    width: 10px; height: 34px;
    background: linear-gradient(180deg, #ff6b8a, #c0132a);
    border-radius: 2px;
    box-shadow: 0 0 6px rgba(200,0,40,0.4);
  }
  .wick { width: 1.5px; height: 5px; background: #333; margin-bottom: 1px; }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Falling petals -->

<!-- Floating background flowers -->

<!-- Main card -->
<div class="card">

        <ellipse cx="22" cy="50" rx="8" ry="5" fill="#3a9a3a" opacity="0.85" transform="rotate(-25,22,50)"/>

  </div>
  <div class="corner tr">
    <svg class="flower-svg" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(10,10)">
        <ellipse cx="35" cy="20" rx="10" ry="18" fill="#c0132a" opacity="0.9" transform="rotate(-30,35,35)"/>
        <ellipse cx="50" cy="15" rx="10" ry="18" fill="#a00020" opacity="0.85" transform="rotate(0,35,35)"/>
        <ellipse cx="55" cy="30" rx="10" ry="18" fill="#c0132a" opacity="0.9" transform="rotate(30,35,35)"/>
        <ellipse cx="40" cy="40" rx="10" ry="18" fill="#e02040" opacity="0.8" transform="rotate(60,35,35)"/>
        <ellipse cx="20" cy="35" rx="10" ry="18" fill="#b01030" opacity="0.85" transform="rotate(-60,35,35)"/>
        <circle cx="35" cy="35" r="9" fill="#ff4060"/>
        <circle cx="35" cy="35" r="5" fill="#ffd0d8"/>
        <line x1="35" y1="44" x2="35" y2="70" stroke="#2d7a2d" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M35,58 Q22,52 18,44" stroke="#2d7a2d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="50" rx="8" ry="5" fill="#3a9a3a" opacity="0.85" transform="rotate(-25,22,50)"/>
      </g>
    </svg>
  </div>
  <div class="corner bl">
    <svg class="flower-svg" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(10,10)">
        <ellipse cx="35" cy="20" rx="10" ry="18" fill="#c0132a" opacity="0.9" transform="rotate(-30,35,35)"/>

        <ellipse cx="20" cy="35" rx="10" ry="18" fill="#b01030" opacity="0.85" transform="rotate(-60,35,35)"/>
        <circle cx="35" cy="35" r="9" fill="#ff4060"/>
        <circle cx="35" cy="35" r="5" fill="#ffd0d8"/>
        <line x1="35" y1="44" x2="35" y2="70" stroke="#2d7a2d" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M35,58 Q22,52 18,44" stroke="#2d7a2d" stroke-width="2" fill="none" stroke-linecap="round"/>
        <ellipse cx="22" cy="50" rx="8" ry="5" fill="#3a9a3a" opacity="0.85" transform="rotate(-25,22,50)"/>
      </g>
    </svg>
  </div>
  <div class="corner br">
    <svg class="flower-svg" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
      <g transform="translate(10,10)">
        <ellipse cx="35" cy="20" rx="10" ry="18" fill="#c0132a" opacity="0.9" transform="rotate(-30,35,35)"/>

<script>
// ── Stars ──
(function() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 140; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      --d:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*4).toFixed(1)}s;
    `;
    container.appendChild(s);
  }
})();

// ── Falling petals ──
(function() {
  const container = document.getElementById('petals');
  const colors = ['#c0132a','#a00020','#e02040','#ff1a45','#d01838','#ff4060','#b00030'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const size = (Math.random()*14+8).toFixed(0);
    p.style.cssText = `
      left:${Math.random()*100}%;
      --s:${size}px;
      --c:${colors[Math.floor(Math.random()*colors.length)]};
      --fd:${(Math.random()*8+6).toFixed(1)}s;
      --fd2:${(Math.random()*10).toFixed(1)}s;
      --sw:${(Math.random()*2+2).toFixed(1)}s;
      --ml:${(Math.random()*80-40).toFixed(0)}px;
    `;
    container.appendChild(p);
  }
})();

// ── SVG rose builder ──
function makeSVGRose(size, colors) {
  const [c1,c2,c3] = colors || ['#c0132a','#e02040','#ff4060'];
  return `<svg width="${size}" height="${size}" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="30" cy="14" rx="8"  ry="14" fill="${c1}" opacity="0.9"  transform="rotate(-40,30,30)"/>
    <ellipse cx="44" cy="16" rx="8"  ry="14" fill="${c2}" opacity="0.85" transform="rotate(-10,30,30)"/>
    <ellipse cx="48" cy="30" rx="8"  ry="14" fill="${c1}" opacity="0.9"  transform="rotate(20,30,30)"/>
    <ellipse cx="38" cy="44" rx="8"  ry="14" fill="${c3}" opacity="0.8"  transform="rotate(50,30,30)"/>
    <ellipse cx="22" cy="45" rx="8"  ry="14" fill="${c2}" opacity="0.85" transform="rotate(80,30,30)"/>
    <ellipse cx="12" cy="36" rx="8"  ry="14" fill="${c1}" opacity="0.9"  transform="rotate(110,30,30)"/>
    <ellipse cx="12" cy="22" rx="8"  ry="14" fill="${c3}" opacity="0.8"  transform="rotate(140,30,30)"/>
    <ellipse cx="22" cy="13" rx="8"  ry="14" fill="${c2}" opacity="0.85" transform="rotate(170,30,30)"/>
    <circle  cx="30" cy="30" r="11" fill="${c3}"/>
    <circle  cx="30" cy="30" r="6"  fill="#ffd0d8"/>
  </svg>`;
}

// ── Floating background flowers ──
(function() {
  const container = document.getElementById('bgFlowers');
  const shades = [
    ['#c0132a','#e02040','#ff4060'],
    ['#a00020','#c0132a','#e02040'],
    ['#d01030','#ff1a45','#ff6070'],
    ['#800020','#b01030','#d03050'],
  ];
  for (let i = 0; i < 22; i++) {
    const div = document.createElement('div');
    div.className = 'bg-flower';
    const size = Math.floor(Math.random()*50+30);
    div.innerHTML = makeSVGRose(size, shades[Math.floor(Math.random()*shades.length)]);
    div.style.cssText = `
      left:${Math.random()*95}%;
      top:${Math.random()*100+80}%;
      --fu:${(Math.random()*10+10).toFixed(1)}s;
      --fu2:${(Math.random()*12).toFixed(1)}s;
    `;
    container.appendChild(div);
  }
})();

// ── Rose row inside card ──
(function() {
  const row = document.getElementById('rosesRow');
  const configs = [
    ['#a00020','#c0132a','#e02040'],
    ['#c0132a','#e02040','#ff4060'],
    ['#d01030','#ff1a45','#ff6070'],
    ['#c0132a','#e02040','#ff4060'],
    ['#a00020','#c0132a','#e02040'],
  ];
  configs.forEach(c => {
    const span = document.createElement('span');
    span.className = 'rose-icon';
    span.innerHTML = makeSVGRose(44, c);
    row.appendChild(span);
  });
})();
</script>
</body>
